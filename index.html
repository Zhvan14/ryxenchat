<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ryxen chat</title>
    <style>
        body {
            font-family: sans-serif;
            background: #000000;
            color: #a0a0a0;
            display: flex;
            flex-direction: column;
            height: 100vh;
            margin: 0;
        }

        #chat-box {
            flex: 1;
            overflow-y: auto;
            padding: 20px;
            border-bottom: 1px solid #333;
        }

        .msg {
            margin-bottom: 10px;
            padding: 8px;
            border-radius: 4px;
            background: #1e1e1e;
        }

        .time {
            color: #888;
            font-size: 0.8em;
            margin-right: 8px;
        }

        .user {
            font-weight: bold;
            color: #4caf50;
            margin-right: 8px;
        }

        .input-area {
            padding: 20px;
            display: flex;
            gap: 10px;
            background: #181818;
        }

        input {
            flex: 1;
            padding: 12px;
            border-radius: 4px;
            border: 1px solid #444;
            background: #000000;
            color: white;
        }

        button {
            padding: 10px 20px;
            background: #000000;
            border: none;
            color: white;
            border-radius: 4px;
            cursor: pointer;
        }
    </style>
</head>

<body>
<div id="chat-box">
    <div class="msg">
        ryxen chat
        logged in as: <span id="display-name">...</span>
    </div>
</div>

<div class="input-area">
    <input type="text" id="msg-input" placeholder="type a message" autocomplete="off">
    <button onclick="sendMessage()">send</button>
</div>
<script>

    // Firebase URL
    const DB_URL = "https://ryxen-chat-default-rtdb.firebaseio.com/messages.json";

    let username = prompt("Enter your username:") || "user";
    document.getElementById('display-name').innerText = username;

    let lastRendered = "";

    // SEND MESSAGE
    async function sendMessage() {

        const input = document.getElementById('msg-input');
        const text = input.value.trim();

        if (!text) return;

        input.value = "";

        try {

            // Get existing messages
            const response = await fetch(DB_URL);
            let messages = await response.json();

            if (!Array.isArray(messages)) {
                messages = [];
            }

            // Add new message
            messages.push({
                user: username,
                text: text,
                time: new Date().toLocaleTimeString([], {
                    hour12: false
                })
            });

            // Keep only last 5
            messages = messages.slice(-5);

            // Save back to Firebase
            await fetch(DB_URL, {
                method: "PUT",
                headers: {
                    "Content-Type": "application/json"
                },
                body: JSON.stringify(messages)
            });

        } catch (e) {
            console.error("Send failed", e);
        }
    }

    // FETCH MESSAGES
    async function fetchMessages() {

        try {

            const response = await fetch(DB_URL);
            const messages = await response.json();

            if (!Array.isArray(messages)) return;

            const currentState = JSON.stringify(messages);

            // Prevent unnecessary rerender
            if (currentState === lastRendered) return;

            lastRendered = currentState;

            const chatBox = document.getElementById('chat-box');

            // Clear chat except welcome message
            chatBox.innerHTML = `
                <div class="msg">
                    ryxen chat
                    logged in as:
                    <span id="display-name">${username}</span>
                </div>
            `;

            // Render messages
            messages.forEach(msg => {

                const div = document.createElement('div');

                div.className = 'msg';

                div.innerHTML = `
                    <span class="time">${msg.time}</span>
                    <span class="user">${msg.user}:</span>
                    <span>${msg.text}</span>
                `;

                chatBox.appendChild(div);
            });

            // Auto scroll
            chatBox.scrollTop = chatBox.scrollHeight;

        } catch (e) {
            console.error("Fetch failed", e);
        }
    }

    // Enter key support
    document.getElementById('msg-input')
        .addEventListener('keypress', (e) => {

            if (e.key === 'Enter') {
                sendMessage();
            }
        });

    // Poll every second
    setInterval(fetchMessages, 1000);

    // Initial fetch
    fetchMessages();

</script>
</body>
</html>
